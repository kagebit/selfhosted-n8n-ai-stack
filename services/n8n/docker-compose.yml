services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"  # Tailscale Funnel apunta aquí para HTTPS
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - DB_TYPE=${DB_TYPE:-postgresdb}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST:-Postgres_RAG}
      - DB_POSTGRESDB_PORT=${DB_POSTGRESDB_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD}
    env_file:
      - .env
    volumes:
      - ./n8n-data:/home/node/.n8n
      # Optional: Uncomment and set paths in .env for shared file access
      # - ${WHISPER_FILES_PATH:-./shared/whisper}:/files
      # - ${RAG_SHARED_PATH:-./shared/rag}:/data/shared
    networks:
      - internal
      - n8n-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  internal:
    driver: bridge
  n8n-net:
    external: true
